<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>问卷</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
    background: #f0f4f8;
    font-family: Arial, sans-serif;
    min-height: 100vh;
    padding: 30px 20px;
    display: flex;
    justify-content: center;
    align-items: center;
}
.container {
    max-width: 640px;
    width: 100%;
    background: #ffffff;
    border-radius: 16px;
    padding: 40px 36px;
    box-shadow: 0 8px 40px rgba(0,0,0,0.08);
}
h1 {
    text-align: center;
    color: #1a73e8;
    font-size: 26px;
    margin-bottom: 6px;
}
.subtitle {
    text-align: center;
    color: #666;
    font-size: 15px;
    margin-bottom: 30px;
}
.question {
    margin-bottom: 24px;
    padding-bottom: 20px;
    border-bottom: 1px solid #eee;
}
.q-title {
    font-weight: bold;
    font-size: 16px;
    color: #222;
    margin-bottom: 12px;
}
.q-title .required { color: #e53935; margin-left: 4px; }
.options label {
    display: block;
    padding: 8px 14px;
    margin: 6px 0;
    background: #f8faff;
    border-radius: 6px;
    cursor: pointer;
    border: 1px solid #e8edf4;
    transition: 0.2s;
}
.options label:hover { background: #eef4ff; border-color: #1a73e8; }
.options input[type="radio"] { margin-right: 10px; }
textarea {
    width: 100%;
    min-height: 90px;
    padding: 12px;
    border: 1px solid #ddd;
    border-radius: 8px;
    font-size: 15px;
    font-family: Arial, sans-serif;
    resize: vertical;
}
textarea:focus { outline: none; border-color: #1a73e8; box-shadow: 0 0 0 3px rgba(26,115,232,0.12); }
.submit-btn {
    display: block;
    width: 100%;
    padding: 14px;
    background: #1a73e8;
    color: #fff;
    border: none;
    border-radius: 8px;
    font-size: 18px;
    font-weight: bold;
    cursor: pointer;
    transition: 0.25s;
}
.submit-btn:hover { background: #1557b0; transform: translateY(-1px); box-shadow: 0 6px 20px rgba(26,115,232,0.25); }
.submit-btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
#status-msg {
    text-align: center;
    padding: 12px;
    margin-top: 16px;
    border-radius: 8px;
    font-weight: 600;
    display: none;
}
#status-msg.success { display: block; background: #e6f7e6; color: #1e7e34; border: 1px solid #b7e0b7; }
#status-msg.error { display: block; background: #fee; color: #b33; border: 1px solid #f5c6c6; }
.footer { text-align: center; color: #aaa; margin-top: 24px; font-size: 13px; }
</style>
</head>
<body>

<div class="container">
    <h1>📋 问卷标题</h1>
    <div class="subtitle">请根据实际情况填写，感谢您的参与</div>

    <div class="question">
        <div class="q-title">1. 您对我们的服务满意吗？ <span class="required">*</span></div>
        <div class="options">
            <label><input type="radio" name="q1" value="非常满意"> 非常满意</label>
            <label><input type="radio" name="q1" value="满意"> 满意</label>
            <label><input type="radio" name="q1" value="一般"> 一般</label>
            <label><input type="radio" name="q1" value="不满意"> 不满意</label>
        </div>
    </div>

    <div class="question">
        <div class="q-title">2. 您有什么建议或意见？</div>
        <textarea id="q2" placeholder="请畅所欲言..."></textarea>
    </div>

    <button class="submit-btn" id="submitBtn" onclick="submitForm()">提交问卷</button>
    <div id="status-msg"></div>
    <div class="footer">© 2026</div>
</div>

<script>
// ===== 改成你的 Render 后端地址 =====
const API_URL = 'https://nsfw-questionnaire.onrender.com/api/submit';
// =====================================

async function submitForm() {
    const btn = document.getElementById('submitBtn');
    const statusEl = document.getElementById('status-msg');
    statusEl.style.display = 'none';
    statusEl.className = '';

    const q1 = document.querySelector('input[name="q1"]:checked');
    if (!q1) {
        statusEl.textContent = '⚠️ 请先回答第1题';
        statusEl.className = 'error';
        statusEl.style.display = 'block';
        return;
    }

    btn.disabled = true;
    btn.textContent = '提交中...';

    try {
        const response = await fetch(API_URL, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                q1: q1.value,
                q2: document.getElementById('q2').value.trim()
            })
        });

        const result = await response.json();

        if (!response.ok) {
            throw new Error(result.error || '提交失败');
        }

        statusEl.textContent = '✅ 提交成功！感谢您的参与！';
        statusEl.className = 'success';
        statusEl.style.display = 'block';
        document.querySelector('input[name="q1"]:checked').checked = false;
        document.getElementById('q2').value = '';

    } catch (err) {
        statusEl.textContent = '❌ ' + err.message;
        statusEl.className = 'error';
        statusEl.style.display = 'block';
    }

    btn.disabled = false;
    btn.textContent = '提交问卷';
}
</script>
</body>
</html>
